name: Release

# Tag a version (e.g. `git tag v0.1.1 && git push origin v0.1.1`) to:
#   1. publish @pedra-ai/mcp to npm (with provenance),
#   2. publish server.json to the official MCP registry (registry.modelcontextprotocol.io), and
#   3. build the .mcpb bundle and attach it to a GitHub Release for the tag
#      (so the Anthropic MCP directory can pick up new versions from Releases).
#
# Requires one repo secret: NPM_TOKEN (an npm automation token for the @pedra-ai org).
# The MCP registry publish needs no secret — it authenticates with the workflow's
# GitHub OIDC token, which authorizes the `io.github.pedra-ai/*` namespace.
# The GitHub Release uses the built-in GITHUB_TOKEN (needs contents: write).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create GitHub Release + upload the .mcpb asset
  id-token: write # npm provenance + mcp-publisher github-oidc

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build .mcpb bundle
        run: npx --yes @anthropic-ai/mcpb pack . "pedra-mcp-${GITHUB_REF_NAME}.mcpb"

      - name: Create GitHub Release with the .mcpb bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "pedra-mcp-${GITHUB_REF_NAME}.mcpb" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Bundle (.mcpb) and npm package for ${GITHUB_REF_NAME}. See CHANGELOG.md for details."

      - name: Install mcp-publisher
        run: |
          curl -sSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz mcp-publisher

      - name: Publish to the official MCP registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
